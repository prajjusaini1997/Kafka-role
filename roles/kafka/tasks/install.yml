---
- name: Install Java on Debian
  apt:
    name: "{{ java_package_debian }}"
    state: present
    update_cache: yes
    cache_valid_time: 3600
  become: yes
  when: ansible_facts['os_family'] == "Debian"
  async: 300
  poll: 10

- name: Install Java on RedHat
  dnf:
    name: "{{ java_package_redhat }}"
    state: present
  become: yes
  when: ansible_facts['os_family'] == "RedHat"
  async: 300
  poll: 10

- name: Create Kafka Group
  group:
    name: "{{ kafka_group }}"
    state: present
  become: yes

- name: Create Kafka User
  user:
    name: "{{ kafka_user }}"
    group: "{{ kafka_group }}"
    system: yes
    shell: /bin/bash
  become: yes

- name: Ensure /opt exists
  file:
    path: /opt
    state: directory
    mode: '0755'
  become: yes

- name: Check Kafka archive
  stat:
    path: "/tmp/kafka_{{ scala_version }}-{{ kafka_version }}.tgz"
  register: kafka_archive

- name: Download Kafka
  get_url:
    url: "{{ kafka_download_url }}"
    dest: "/tmp/kafka_{{ scala_version }}-{{ kafka_version }}.tgz"
    mode: '0644'
  async: 300
  poll: 10
  when: not kafka_archive.stat.exists

- name: Extract Kafka
  unarchive:
    src: "/tmp/kafka_{{ scala_version }}-{{ kafka_version }}.tgz"
    dest: /opt
    remote_src: yes
    creates: "/opt/kafka_{{ scala_version }}-{{ kafka_version }}"
  become: yes

- name: Check if /opt/kafka is a directory (not a symlink)
  stat:
    path: /opt/kafka
  register: opt_kafka_stat

- name: Stop existing standalone Kafka/Zookeeper processes
  shell: |
    pkill -f 'kafka.Kafka' || true
    pkill -f 'org.apache.zookeeper' || true
  become: yes
  when: opt_kafka_stat.stat.exists and not opt_kafka_stat.stat.islnk

- name: Remove existing /opt/kafka directory if it is not a symlink
  file:
    path: /opt/kafka
    state: absent
  become: yes
  when: opt_kafka_stat.stat.exists and not opt_kafka_stat.stat.islnk

- name: Create symbolic link
  file:
    src: "/opt/kafka_{{ scala_version }}-{{ kafka_version }}"
    dest: "{{ kafka_install_dir }}"
    state: link
    force: yes
  become: yes

- name: Set ownership
  file:
    path: "/opt/kafka_{{ scala_version }}-{{ kafka_version }}"
    owner: "{{ kafka_user }}"
    group: "{{ kafka_group }}"
    recurse: yes
  become: yes
