---
# Tasks related to ZooKeeper will be added here.

- name: Copy ZooKeeper systemd service
  template:
    src: zookeeper.service.j2
    dest: /etc/systemd/system/zookeeper.service
    mode: '0644'
  become: yes

- name: Reload systemd
  systemd:
    daemon_reload: yes
  become: yes

- name: Enable ZooKeeper
  systemd:
    name: zookeeper
    enabled: yes
  become: yes

- name: Start ZooKeeper
  systemd:
    name: zookeeper
    state: started
  become: yes
