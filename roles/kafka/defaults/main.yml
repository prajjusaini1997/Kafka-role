---
# defaults file for roles/kafka

# Kafka Version
kafka_version: "3.9.1"
scala_version: "2.13"

# Java Package
java_package_debian: openjdk-17-jdk
java_package_redhat: java-17-openjdk

# Kafka User
kafka_user: kafka
kafka_group: kafka

# Installation Path
kafka_install_dir: /opt/kafka

# Kafka Download URL
kafka_download_url: "https://archive.apache.org/dist/kafka/{{ kafka_version }}/kafka_{{ scala_version }}-{{ kafka_version }}.tgz"

# Configuration
kafka_port: 9092
zookeeper_connect: "10.0.2.170:2181"
log_dirs: /tmp/kafka-logs

#zookeeper_port: 2181
zookeeper_data_dir: /tmp/zookeeper

